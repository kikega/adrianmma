{% load static %}
{% if items %}
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    {% for item in items %}
    <div class="gallery-item relative overflow-hidden rounded-lg aspect-square cursor-pointer">
        {% if item.media_type == 'foto' %}
        <img src="{{ item.image.url }}" alt="{{ item.title }}" class="w-full h-full object-cover">
        {% else %}
        <iframe src="{{ item.video_url }}" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
        {% endif %}
        <div class="absolute inset-0 bg-black/50 opacity-0 hover:opacity-100 transition flex items-center justify-center">
            <p class="text-white font-display">{{ item.title }}</p>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="col-span-full text-center py-20">
    <i class="fas fa-camera text-6xl text-gray-700 mb-4"></i>
    <p class="text-gray-500">No hay contenido disponible</p>
</div>
{% endif %}
